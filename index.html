<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A minimal landing page built from a Figma design.">
    <title>Nexcent</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header class="header">
        <div class="container container--header">
            <img class="header__logo" src="./img/header-logo.svg" alt="Company logo">
            <nav class="header__nav">
                <ul class="header__list">
                    <li class="header__item">
                        <a class="header__link header__link--active" href="#">Home</a>
                    </li>
                    <li class="header__item">
                        <a class="header__link" href="#">Service</a>
                    </li>
                    <li class="header__item">
                        <a class="header__link" href="#">Feature</a>
                    </li>
                    <li class="header__item">
                        <a class="header__link" href="#">Product</a>
                    </li>
                    <li class="header__item">
                        <a class="header__link" href="#">Testimonial</a>
                    </li>
                    <li class="header__item">
                        <a class="header__link" href="#">FAQ</a>
                    </li>
                </ul>
            </nav>
            <div class="header__auth">
                <button class="btn btn--secondary header__btn" type="button">Login</button>
                <button class="btn btn--primary header__btn" type="button">Sign up</button>
            </div>
        </div>
    </header>
    <main>
        <section class="hero">
            <div class="container hero__wrapper">
                <div class="hero__content">
                    <h1 class="hero__title">Lessons and insights<br>
                        <span class="hero__accent">from 8 years</span>
                    </h1>
                    <p class="hero__text">Where to grow your business as a photographer: site or social media?</p>
                    <button class="btn btn--primary hero__btn">Register</button>
                </div>
                <div class="hero__media">
                    <img src="/img/hero-image.svg" alt="Illustration" class="hero__image">
                </div>
            </div>
            <div class="hero__pages">
                <button class="btn btn--primary hero__dot"></button>
                <button class="btn btn--primary hero__dot hero__dot--disabled"></button>
                <button class="btn btn--primary hero__dot hero__dot--disabled"></button>
            </div>
        </section>
    </main>
</body>

</html>
